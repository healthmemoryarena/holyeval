name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group lint
      - run: uv run ruff check . || true
      - run: uv run ruff format --check . || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync
      - run: >
          uv run pytest evaluator/tests/ -v
          --ignore=evaluator/tests/test_e2e.py
          --ignore=evaluator/tests/test_preset_answer_eval.py
          --ignore=evaluator/tests/test_data_flow.py
          --ignore=evaluator/tests/test_eval_only.py
          --ignore=evaluator/tests/test_report_reader.py
          || true
