{% extends "base.html" %}
{% block title %}{{ guide_title }} - HolyEval{% endblock %}

{% block content %}
<div x-data="guideDetail('{{ guide_name }}')" x-init="init()">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
        <a href="#" @click.prevent="history.back()" class="text-muted-foreground hover:text-foreground transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
        </a>
        <h1 class="text-xl font-semibold tracking-tight" x-text="title"></h1>
    </div>

    <!-- Content -->
    <div class="rounded-lg border border-border bg-card p-6">
        <div x-show="loading" class="text-center py-8 text-sm text-muted-foreground">
            <svg class="w-5 h-5 mx-auto mb-2 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Loading...
        </div>
        <div x-show="!loading" class="prose-readme text-sm leading-relaxed" x-ref="content"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/marked.min.js"></script>
<script>
function guideDetail(guideName) {
    return {
        title: '',
        loading: true,

        async init() {
            try {
                const res = await fetch(`/api/guides/${guideName}`);
                if (res.ok) {
                    const data = await res.json();
                    this.title = data.title;
                    if (this.$refs.content) {
                        this.$refs.content.innerHTML = marked.parse(data.content);
                        // Remove the first h1 (page header already shows the title)
                        const firstH1 = this.$refs.content.querySelector('h1');
                        if (firstH1) firstH1.remove();
                    }
                }
            } finally {
                this.loading = false;
            }
        }
    };
}
</script>
{% endblock %}
