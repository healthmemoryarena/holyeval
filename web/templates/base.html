<!DOCTYPE html>
<html lang="en" x-data="themeManager()" :class="dark && 'dark'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HolyEval{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: 'var(--border)',
                        input: 'var(--input)',
                        ring: 'var(--ring)',
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        primary: { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
                        secondary: { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
                        muted: { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
                        accent: { DEFAULT: 'var(--accent)', foreground: 'var(--accent-foreground)' },
                        destructive: { DEFAULT: 'var(--destructive)', foreground: 'var(--destructive-foreground)' },
                        popover: { DEFAULT: 'var(--popover)', foreground: 'var(--popover-foreground)' },
                        card: { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
                        sidebar: { DEFAULT: 'var(--sidebar)', foreground: 'var(--sidebar-foreground)', accent: 'var(--sidebar-accent)', border: 'var(--sidebar-border)' },
                        success: { DEFAULT: 'var(--success)', foreground: 'var(--success-foreground)' },
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="min-h-screen bg-background text-foreground antialiased">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-56 shrink-0 bg-sidebar border-r border-sidebar-border flex flex-col fixed inset-y-0 left-0 z-30">
            <!-- Logo -->
            <div class="h-14 flex items-center px-4 border-b border-sidebar-border">
                <a href="/" class="flex items-center gap-2.5">
                    <div class="w-7 h-7 rounded-lg bg-primary flex items-center justify-center">
                        <span class="text-primary-foreground text-xs font-bold">H</span>
                    </div>
                    <span class="text-sidebar-foreground font-semibold text-[15px] tracking-tight">HolyEval</span>
                </a>
            </div>

            <!-- Nav -->
            <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-6">
                <div class="space-y-0.5">
                    <p class="px-2 mb-2 text-[10px] font-semibold text-muted-foreground uppercase tracking-widest">Evaluation</p>
                    <a href="/tasks" class="sidebar-item {% if nav == 'tasks' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/></svg>
                        <span>Run Eval</span>
                    </a>
                    <a href="/benchmarks" class="sidebar-item {% if nav == 'benchmarks' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
                        <span>Benchmarks</span>
                    </a>
                    <a href="/virtual-users" class="sidebar-item {% if nav == 'virtual_users' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
                        <span>Virtual Users</span>
                    </a>
                </div>

                <div class="space-y-0.5">
                    <p class="px-2 mb-2 text-[10px] font-semibold text-muted-foreground uppercase tracking-widest">Agent Registry</p>
                    <a href="/agents/target" class="sidebar-item {% if nav == 'agents_target' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 100 6h13.5a3 3 0 100-6m-16.5-3a3 3 0 013-3h13.5a3 3 0 013 3m-19.5 0a4.5 4.5 0 01.9-2.7L5.737 5.1a3.375 3.375 0 012.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 01.9 2.7m0 0a3 3 0 01-3 3m0 3h.008v.008h-.008v-.008zm0-6h.008v.008h-.008v-.008zm-3 6h.008v.008h-.008v-.008zm0-6h.008v.008h-.008v-.008z"/></svg>
                        <span>Target</span>
                    </a>
                    <a href="/agents/eval" class="sidebar-item {% if nav == 'agents_eval' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
                        <span>Evaluator</span>
                    </a>
                    <a href="/agents/test" class="sidebar-item {% if nav == 'agents_test' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5"/></svg>
                        <span>Test Agent</span>
                    </a>
                </div>

                <div class="space-y-0.5">
                    <p class="px-2 mb-2 text-[10px] font-semibold text-muted-foreground uppercase tracking-widest">Quick Start</p>
                    <a href="/guides/overview" class="sidebar-item {% if nav == 'guide_overview' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
                        <span>Overview</span>
                    </a>
                    <a href="/guides/develop-eval-agent" class="sidebar-item {% if nav == 'guide_develop-eval-agent' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/></svg>
                        <span>Build EvalAgent</span>
                    </a>
                    <a href="/guides/develop-target-agent" class="sidebar-item {% if nav == 'guide_develop-target-agent' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg>
                        <span>Build TargetAgent</span>
                    </a>
                    <a href="/guides/generate-benchmark" class="sidebar-item {% if nav == 'guide_generate-benchmark' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                        <span>Gen Benchmark</span>
                    </a>
                    <a href="/guides/e2e-test" class="sidebar-item {% if nav == 'guide_e2e-test' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span>E2E Test</span>
                    </a>
                    <a href="/guides/run-benchmark" class="sidebar-item {% if nav == 'guide_run-benchmark' %}sidebar-item-active{% endif %}">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941"/></svg>
                        <span>Run Benchmark</span>
                    </a>
                </div>
            </nav>

            <!-- Footer: theme toggle -->
            <div class="p-3 border-t border-sidebar-border">
                <button @click="toggle()" class="sidebar-item w-full">
                    <template x-if="!dark">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
                    </template>
                    <template x-if="dark">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
                    </template>
                    <span x-text="dark ? 'Light Mode' : 'Dark Mode'"></span>
                </button>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 ml-56 min-h-screen">
            <div class="max-w-5xl mx-auto px-8 py-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
    function themeManager() {
        return {
            dark: localStorage.getItem('holyeval-theme') === 'dark',
            toggle() {
                this.dark = !this.dark;
                localStorage.setItem('holyeval-theme', this.dark ? 'dark' : 'light');
            }
        }
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
